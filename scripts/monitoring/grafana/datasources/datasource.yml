# Grafana datasource configuration
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      queryTimeout: "30s"
      httpMethod: "POST"
      manageAlerts: true
      prometheusType: "Prometheus"
      prometheusVersion: "2.48.0"
      cacheLevel: "Low"
      disableRecordingRules: false
      incrementalQueryOverlapWindow: "10m"
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo

  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    database: ddos_platform
    user: ddos_user
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      sslmode: "disable"
      postgresVersion: 1600
      timescaledb: true
    isDefault: false
    editable: false