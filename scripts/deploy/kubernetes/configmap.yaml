apiVersion: v1
kind: ConfigMap
metadata:
  name: ddos-config
  namespace: ddos-defense
data:
  # Default configuration overrides for Kubernetes
  default.yaml: |
    environment: production
    log_level: INFO
    debug: false

    kafka:
      bootstrap_servers:
        - kafka:9092
      topics:
        telemetry_raw: ddos.telemetry.raw.prod
        flows: ddos.telemetry.flows.prod
        alerts: ddos.alerts.prod
        mitigation_events: ddos.mitigation.events.prod

    database:
      host: postgres
      port: 5432
      name: ddos_platform
      user: ddos_user
      ssl_mode: disable

    redis:
      host: redis
      port: 6379
      db: 0

    detection:
      anomaly:
        volumetric:
          threshold_mbps: 1000
          threshold_pps: 500000
        syn_flood:
          threshold: 5000
      ml:
        enabled: true
        model_path: /models/ensemble_model.joblib
        confidence_threshold: 0.85

    mitigation:
      auto_response: true
      dry_run: false
      rollback_delay: 600
      rate_limiting:
        default_mbps: 200
        default_pps: 10000
        per_ip:
          limit_mbps: 20
          limit_pps: 1000

    api:
      host: 0.0.0.0
      port: 8000
      workers: 4
      cors_origins:
        - https://dashboard.ddos-defense.internal

  # Detection thresholds (volumetric)
  volumetric.yaml: |
    mbps:
      warning: 500
      critical: 1000
    pps:
      warning: 250000
      critical: 500000
    protocols:
      tcp:
        syn:
          warning: 5000
          critical: 25000
      udp:
        warning: 5000
        critical: 25000

  # Behavioral detection configuration
  behavioral.yaml: |
    entropy:
      threshold: 3.5
      window: 60
    tcp:
      syn_flood:
        threshold: 5000
    http:
      request_rate_threshold: 500