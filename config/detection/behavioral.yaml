# Behavioral Anomaly Detection Configuration
# Parameters for statistical and behavioral analysis

# Entropy-based detection
entropy:
  enabled: true
  # Features to compute entropy on
  features:
    - src_ip
    - dst_ip
    - src_port
    - dst_port
    - protocol
  # Entropy threshold (lower entropy indicates concentration, possible attack)
  threshold: 3.5
  # Time window for entropy calculation (seconds)
  window: 60
  # Minimum samples required for entropy calculation
  min_samples: 100
  # Rolling baseline
  baseline_window: 3600  # seconds

# Flow-based behavioral features
flow_features:
  # Flow duration statistics
  duration:
    mean_threshold_ms: 1000
    std_threshold_ms: 500
    max_threshold_ms: 5000
  # Packet size statistics
  packet_size:
    mean_threshold: 100  # bytes
    std_threshold: 50
    # Small packets (potential flood)
    small_packet_ratio_threshold: 0.8
    small_packet_size: 64
    # Large packets (potential amplification)
    large_packet_size: 1400
  # Inter-arrival times
  inter_arrival:
    mean_threshold_ms: 10
    std_threshold_ms: 5
    # Periodic behavior detection
    periodicity_threshold: 0.9
  # Flow rate
  rate:
    flows_per_second_threshold: 1000
    packets_per_flow_threshold: 10
    bytes_per_flow_threshold: 1000

# TCP-specific behavioral anomalies
tcp:
  # SYN flood detection
  syn_flood:
    threshold: 1000  # SYN packets per second per destination
    window: 10
    # Half-open connection tracking
    half_open_threshold: 500
  # FIN/RST flood
  fin_rst_flood:
    threshold: 2000
  # SYN-ACK ratio
  syn_ack_ratio:
    threshold: 10  # SYN > ACK * threshold
  # TCP options anomalies
  options:
    check_ttl: true
    ttl_variance_threshold: 5
    check_mss: true
    mss_variance_threshold: 100

# UDP behavioral anomalies
udp:
  # Flood detection
  flood_threshold: 5000  # packets per second
  # Fragmented packets
  fragmented_threshold: 1000  # fragments per second
  # Amplification detection
  amplification:
    enabled: true
    request_response_ratio: 10
    known_ports:
      - 53   # DNS
      - 123  # NTP
      - 1900 # SSDP
      - 11211 # Memcached

# ICMP behavioral anomalies
icmp:
  flood_threshold: 2000
  # Echo flood
  echo_flood_threshold: 1000
  # Destination unreachable flood
  unreachable_flood_threshold: 500
  # Smurf attack detection
  smurf:
    enabled: true
    broadcast_threshold: 500

# DNS-specific anomalies
dns:
  enabled: true
  # Query flood
  query_flood_threshold: 5000
  # Response size anomalies
  response_size_threshold: 1000
  # Tunneling detection
  tunneling:
    enabled: true
    domain_length_threshold: 100
    entropy_threshold: 4.5

# HTTP/HTTPS anomalies
http:
  enabled: true
  # Request rate per IP
  request_rate_threshold: 500
  # Slowloris detection
  slowloris:
    enabled: true
    min_headers: 10
    time_window: 60
  # HTTP flood
  flood_threshold: 1000
  # URL-based anomalies
  url:
    depth_threshold: 5
    length_threshold: 1000
    repeated_params_threshold: 10
  # User-agent anomalies
  user_agent:
    check_known_bots: true
    missing_ua_threshold: 0.5  # ratio of missing UA

# Baseline learning
baseline:
  enabled: true
  learning_duration_hours: 24
  # Update baseline daily
  update_frequency_hours: 24
  # Statistical methods
  method: median_iqr  # median_iqr, mean_std, percentiles
  # Confidence intervals
  confidence_level: 0.95
  # Deviation factor
  deviation_factor: 3.0
  # Minimum historical samples
  min_samples: 1000

# Correlation across multiple flows
correlation:
  enabled: true
  # Detect coordinated attacks from multiple sources
  source_correlation:
    window: 60
    min_sources: 10
    similarity_threshold: 0.8
  # Detect attacks targeting multiple destinations
  destination_correlation:
    window: 60
    min_destinations: 5
    pattern_threshold: 0.7

# Time-series forecasting
forecasting:
  enabled: true
  method: holt_winters  # holt_winters, arima
  seasonal_periods: 86400  # 24 hours in seconds
  alpha: 0.3
  beta: 0.1
  gamma: 0.2
  prediction_horizon: 60  # seconds
  anomaly_threshold: 2.5  # standard deviations

# Alert thresholds
alert:
  min_confidence: 0.6
  cooldown_seconds: 30
  # Suppress repeated alerts
  suppression_window: 300